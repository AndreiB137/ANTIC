# ============================================================
# BSSN (numerical relativity) experiment — ANTIC
# ============================================================

seed: 42

solver:
  name: bssn

model:
  name: mlp+
  input_dim: 3
  output_dim: 18
  hidden_dim: 256
  num_hidden_layers: 5
  fourier_emb_dim: 256
  fourier_emb_scale: 1.0

optimizer:
  name: adamw
  learning_rate: 1.0e-3
  weight_decay: 1.0e-4
  scheduler:
    type: cosine_decay
    end_lr: 1.0e-5

training:
  initial_epochs: 200
  subsequent_epochs: 50
  batch_size: 100000
  filter: all
  verbose: false
  stop_at: 10.0
  save_dir: bssn/

selector:
  type: bssn
  surge_factor: 1.55
  history_len: 60
  patience_factor: 5
  window_size: 5

wandb:
  enabled: false
  project: ANTIC
  name: bssn-test
  tags: [bssn, numerical-relativity, mlp+, all]
  log_every: 5
